<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Timelapse Overlay</title>
<style>

/* ══════════════════════════════════════════
   RESET & VARIABLES
══════════════════════════════════════════ */

*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}

:root {
  --safe-top:    env(safe-area-inset-top,    44px);
  --safe-bottom: env(safe-area-inset-bottom, 34px);
  --accent:  #0A84FF;
  --yellow:  #FFD60A;
  --danger:  #FF453A;
  --surface: rgba(28, 28, 30, 0.94);
  --text:    #ffffff;
  --text2:   rgba(255, 255, 255, 0.55);
}

html {
  height: -webkit-fill-available;
  overscroll-behavior: none;
}

body {
  width: 100%;
  height: 100vh;
  height: -webkit-fill-available;
  overflow: hidden;
  position: fixed;
  top: 0; left: 0;
  background: #000;
  color: var(--text);
  font-family: -apple-system, 'Helvetica Neue', sans-serif;
  touch-action: none;
  overscroll-behavior: none;
}

/* ══════════════════════════════════════════
   SCREEN SYSTEM
══════════════════════════════════════════ */

.screen {
  position: fixed;
  inset: 0;
  height: 100vh;
  height: -webkit-fill-available;
  display: none;
  background: #000;
}
.screen.active { display: flex; }

/* ══════════════════════════════════════════
   START SCREEN
══════════════════════════════════════════ */

#screen-start {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 32px;
  padding-top:    calc(var(--safe-top)    + 20px);
  padding-bottom: calc(var(--safe-bottom) + 20px);
  gap: 0;
}

.app-icon {
  width: 88px;
  height: 88px;
  background: linear-gradient(145deg, #1c1c1e, #2c2c2e);
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 22px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.07);
}

.app-title {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.5px;
  margin-bottom: 10px;
}

.app-subtitle {
  font-size: 15px;
  color: var(--text2);
  text-align: center;
  line-height: 1.5;
  max-width: 270px;
  margin-bottom: 48px;
}

.btn {
  width: 100%;
  max-width: 300px;
  padding: 16px;
  border: none;
  border-radius: 13px;
  font-size: 17px;
  font-weight: 600;
  color: #fff;
  cursor: pointer;
  letter-spacing: -0.2px;
  transition: opacity 0.1s;
}
.btn:active { opacity: 0.65; }
.btn-primary   { background: var(--accent); }
.btn-secondary { background: rgba(255,255,255,0.12); margin-top: 12px; }

/* ══════════════════════════════════════════
   PERMISSION SCREEN
══════════════════════════════════════════ */

#screen-permission {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 32px;
  text-align: center;
  gap: 12px;
}

#screen-permission .perm-icon { font-size: 60px; margin-bottom: 8px; }
#screen-permission h2 { font-size: 22px; font-weight: 700; }
#screen-permission p  { color: var(--text2); font-size: 15px; line-height: 1.5; max-width: 270px; }

/* ══════════════════════════════════════════
   CAMERA SCREEN
══════════════════════════════════════════ */

#screen-camera {
  position: fixed;
  inset: 0;
  overflow: hidden;
  touch-action: none;
}

/* Layer 1: Video */
#video {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  background: #000;
  transform: translateZ(0);
  -webkit-transform: translateZ(0);
}

/* Layer 2: Grid Overlay (CSS Only, No DOM bloat) */
#grid-overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 2;
  display: none; /* hidden by default */
  /* 3x3 Rule of Thirds Lines */
  background-image:
    linear-gradient(to right, transparent calc(33.33% - 0.5px), rgba(255,255,255,0.4) calc(33.33% - 0.5px), rgba(255,255,255,0.4) calc(33.33% + 0.5px), transparent calc(33.33% + 0.5px)),
    linear-gradient(to right, transparent calc(66.66% - 0.5px), rgba(255,255,255,0.4) calc(66.66% - 0.5px), rgba(255,255,255,0.4) calc(66.66% + 0.5px), transparent calc(66.66% + 0.5px)),
    linear-gradient(to bottom, transparent calc(33.33% - 0.5px), rgba(255,255,255,0.4) calc(33.33% - 0.5px), rgba(255,255,255,0.4) calc(33.33% + 0.5px), transparent calc(33.33% + 0.5px)),
    linear-gradient(to bottom, transparent calc(66.66% - 0.5px), rgba(255,255,255,0.4) calc(66.66% - 0.5px), rgba(255,255,255,0.4) calc(66.66% + 0.5px), transparent calc(66.66% + 0.5px));
}
#grid-overlay.active { display: block; }

/* Layer 3: Overlay image */
#overlay-img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  opacity: 0.5;
  pointer-events: none;
  display: none;
  z-index: 3;
  transform: translateZ(0);
  -webkit-transform: translateZ(0);
}

/* Layer 4: Shutter flash */
#flash {
  position: absolute;
  inset: 0;
  background: #fff;
  opacity: 0;
  pointer-events: none;
  z-index: 20;
  transition: opacity 0.07s;
}

/* Layer 5: Top bar */
#top-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: calc(var(--safe-top) + 10px) 16px 18px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent);
}

.top-bar-left {
  display: flex;
  gap: 12px;
}

.icon-btn {
  width: 40px;
  height: 40px;
  border: none;
  background: none;
  color: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  flex-shrink: 0;
}
.icon-btn:active { background: rgba(255,255,255,0.2); }

#opacity-badge {
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 13px;
  font-weight: 600;
  color: var(--yellow);
  min-width: 52px;
  text-align: center;
}

/* Layer 6: No-overlay hint */
#no-overlay-hint {
  position: absolute;
  bottom: 200px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 5;
  background: rgba(0,0,0,0.52);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: 14px;
  padding: 12px 18px;
  text-align: center;
  pointer-events: none;
  white-space: nowrap;
}
#no-overlay-hint p {
  font-size: 13px;
  color: rgba(255,255,255,0.75);
  line-height: 1.5;
}

/* Layer 7: Bottom controls */
#bottom-controls {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  z-index: 10;
  background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
  padding-bottom: calc(var(--safe-bottom) + 6px);
}

#slider-row {
  display: none;
  align-items: center;
  padding: 0 24px 14px;
  gap: 12px;
}

.slider-icon { flex-shrink: 0; opacity: 0.5; }

input[type="range"] {
  -webkit-appearance: none;
  flex: 1;
  height: 4px;
  background: rgba(255,255,255,0.28);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
  touch-action: pan-x;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}

#shutter-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 36px 10px;
}

#last-photo-btn {
  width: 58px;
  height: 58px;
  border-radius: 12px;
  border: 2px solid rgba(255,255,255,0.45);
  background: rgba(255,255,255,0.08);
  overflow: hidden;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.1s;
}
#last-photo-btn:active { opacity: 0.6; }
#last-photo-img { width: 100%; height: 100%; object-fit: cover; display: none; }
#last-photo-icon { display: flex; opacity: 0.5; }

#shutter-btn {
  width: 78px;
  height: 78px;
  border: none;
  background: transparent;
  cursor: pointer;
  padding: 0;
  flex-shrink: 0;
  transition: transform 0.08s;
}
#shutter-btn:active { transform: scale(0.91); }

.shutter-ring {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  border: 4px solid #fff;
  display: flex;
  align-items: center;
  justify-content: center;
}
.shutter-fill {
  width: 63px;
  height: 63px;
  border-radius: 50%;
  background: #fff;
}

#load-ref-btn {
  width: 58px;
  height: 58px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.13);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: #fff;
  flex-shrink: 0;
  transition: background 0.1s;
}
#load-ref-btn:active { background: rgba(255,255,255,0.28); }

#ref-input { display: none; }
#canvas    { display: none; }

/* ══════════════════════════════════════════
   SAVE FALLBACK SCREEN
══════════════════════════════════════════ */

#screen-save {
  flex-direction: column;
  background: #000;
  touch-action: auto;
}

#save-preview-img {
  flex: 1;
  width: 100%;
  object-fit: contain;
  background: #000;
  display: block;
  -webkit-touch-callout: default;
  touch-action: auto;
  user-select: auto;
  -webkit-user-select: auto;
}

@keyframes pulse-ring {
  0%   { transform: translate(-50%, -50%) scale(0.92); opacity: 0.9; }
  50%  { transform: translate(-50%, -50%) scale(1.08); opacity: 0.4; }
  100% { transform: translate(-50%, -50%) scale(0.92); opacity: 0.9; }
}

#save-hint-overlay {
  position: absolute;
  bottom: calc(100px + var(--safe-bottom));
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  pointer-events: none;
  z-index: 10;
}

.save-hint-ring {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.7);
  position: relative;
}
.save-hint-ring::after {
  content: '';
  position: absolute;
  inset: -8px;
  border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.35);
  animation: pulse-ring 1.6s ease-in-out infinite;
}
.save-hint-finger {
  font-size: 36px;
  line-height: 1;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6));
}

.save-hint-text {
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-radius: 14px;
  padding: 8px 16px;
  text-align: center;
}
.save-hint-text strong {
  display: block;
  font-size: 15px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 2px;
}
.save-hint-text span {
  font-size: 12px;
  color: rgba(255,255,255,0.6);
}

#save-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px calc(var(--safe-bottom) + 14px);
  background: var(--surface);
  border-top: 0.5px solid rgba(255,255,255,0.1);
  flex-shrink: 0;
  gap: 12px;
}

#save-back-btn {
  background: rgba(255,255,255,0.12);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 12px 20px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.1s;
}
#save-back-btn:active { opacity: 0.65; }

#save-share-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 12px 20px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.1s;
  flex: 1;
}
#save-share-btn:active { opacity: 0.65; }

#toast {
  position: fixed;
  top: calc(var(--safe-top) + 58px);
  left: 50%;
  transform: translateX(-50%) translateY(-8px);
  background: rgba(30,30,32,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 8px 18px;
  font-size: 14px;
  font-weight: 500;
  color: #fff;
  white-space: nowrap;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.18s, transform 0.18s;
}
#toast.visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

</style>
</head>
<body>

<div id="screen-start" class="screen active">
  <div class="app-icon">
    <svg width="50" height="50" viewBox="0 0 50 50" fill="none">
      <circle cx="25" cy="20" r="9" stroke="#FFD60A" stroke-width="2"/>
      <circle cx="25" cy="20" r="4"  fill="#FFD60A" opacity="0.4"/>
      <path d="M8 43c0-9.94 8.06-18 17-18s17 8.06 17 18" stroke="white" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="app-title">Timelapse Overlay</div>
  <div class="app-subtitle">Überlagere die Kamera mit einem Referenzfoto für konsistente Aufnahmen.</div>
  <button class="btn btn-primary" id="btn-start">Kamera starten</button>
</div>

<div id="screen-permission" class="screen">
  <div class="perm-icon">📷</div>
  <h2>Kamerazugriff benötigt</h2>
  <p>Bitte erlaube den Kamerazugriff in den Einstellungen und versuche es erneut.</p>
  <button class="btn btn-primary" id="btn-retry" style="margin-top:24px; max-width:240px">Erneut versuchen</button>
  <button class="btn btn-secondary" id="btn-perm-back" style="max-width:240px">Zurück</button>
</div>

<div id="screen-camera" class="screen">

  <video id="video" autoplay playsinline muted></video>
  
  <div id="grid-overlay"></div>
  
  <img id="overlay-img" alt="">
  <div id="flash"></div>

  <div id="top-bar">
    <div class="top-bar-left">
      <button class="icon-btn" id="btn-close-camera" aria-label="Schließen">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M2 2l12 12M14 2L2 14" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
      </button>
      
      <button class="icon-btn" id="btn-toggle-grid" aria-label="Raster umschalten">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8">
          <path d="M3 8h18M3 16h18M8 3v18M16 3v18"/>
        </svg>
      </button>
    </div>

    <div id="opacity-badge" style="visibility:hidden">50%</div>
    <div style="width:40px"></div>
  </div>

  <div id="no-overlay-hint">
    <p>Referenzbild laden →</p>
  </div>

  <div id="bottom-controls">
    <div id="slider-row">
      <svg class="slider-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
        <circle cx="9" cy="9" r="4" stroke="white" stroke-width="1.5"/>
      </svg>
      <input type="range" id="opacity-slider" min="0" max="100" value="50" aria-label="Transparenz">
      <svg class="slider-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
        <circle cx="9" cy="9" r="7" stroke="white" stroke-width="1.5"/>
        <circle cx="9" cy="9" r="3" fill="white"/>
      </svg>
    </div>

    <div id="shutter-row">
      <button id="last-photo-btn" aria-label="Letztes Foto">
        <img id="last-photo-img" alt="Letztes Foto">
        <span id="last-photo-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <rect x="2" y="6" width="15" height="12" rx="2" stroke="white" stroke-width="1.5"/>
            <path d="M19 9.5l3-2v9l-3-2v-5z" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
          </svg>
        </span>
      </button>

      <button id="shutter-btn" aria-label="Foto aufnehmen">
        <div class="shutter-ring">
          <div class="shutter-fill"></div>
        </div>
      </button>

      <button id="load-ref-btn" aria-label="Referenzbild laden">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="3" width="18" height="18" rx="2.5" stroke="white" stroke-width="1.5"/>
          <path d="M12 15V9M9 12l3-3 3 3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M8 18h8" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

  <input type="file" id="ref-input" accept="image/*">
  <canvas id="canvas"></canvas>
</div>

<div id="screen-save" class="screen">
  <img id="save-preview-img" alt="Aufnahme">
  <div id="save-hint-overlay">
    <div class="save-hint-ring">
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;">
        <span class="save-hint-finger">👆</span>
      </div>
    </div>
    <div class="save-hint-text">
      <strong>Gedrückt halten</strong>
      <span>→ "Bild sichern" wählen</span>
    </div>
  </div>

  <div id="save-bar">
    <button id="save-back-btn">← Zurück</button>
    <button id="save-share-btn">📤 Teilen</button>
  </div>
</div>

<div id="toast" role="status" aria-live="polite"></div>

<script>
'use strict';

/* ══════════════════════════════════════════
   UI HELPERS
══════════════════════════════════════════ */
const UI = (() => {
  const $ = id => document.getElementById(id);
  let toastTimer = null;

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    $(id).classList.add('active');
  }

  function showToast(message, duration = 2200) {
    const el = $('toast');
    el.textContent = message;
    el.classList.add('visible');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('visible'), duration);
  }

  function lockScroll() {
    document.addEventListener('touchmove', e => {
      if (e.target.closest('input[type="range"]')) return;
      e.preventDefault();
    }, { passive: false });
  }

  function dataUrlToBlob(dataUrl) {
    const [header, data] = dataUrl.split(',');
    const mime   = header.match(/:(.*?);/)[1];
    const bytes  = atob(data);
    const buffer = new Uint8Array(bytes.length);
    for (let i = 0; i < bytes.length; i++) buffer[i] = bytes.charCodeAt(i);
    return new Blob([buffer], { type: mime });
  }

  return { $, showScreen, showToast, lockScroll, dataUrlToBlob };
})();

/* ══════════════════════════════════════════
   CAMERA (Mit High-Res Fix)
══════════════════════════════════════════ */
const Camera = (() => {
  const { $, showScreen } = UI;
  let stream = null;

  async function start() {
    stop();
    // FIX 1: Native 4K Auflösung erzwingen (falls das Gerät es unterstützt)
    const constraints = {
      video: { 
        facingMode: { ideal: 'environment' },
        width: { ideal: 3840 }, 
        height: { ideal: 2160 } 
      },
      audio: false
    };

    try {
      stream = await navigator.mediaDevices.getUserMedia(constraints);
      const video = $('video');
      video.srcObject = stream;
      await video.play();
      showScreen('screen-camera');
    } catch (err) {
      console.error('[Camera] start failed:', err.name, err.message);
      showScreen('screen-permission');
    }
  }

  function stop() {
    if (!stream) return;
    stream.getTracks().forEach(t => t.stop());
    stream = null;
    $('video').srcObject = null;
  }

  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && $('screen-camera').classList.contains('active')) {
      if (!stream) start();
      else if ($('video').paused) $('video').play().catch(() => {});
    }
  });

  return { start, stop };
})();

/* ══════════════════════════════════════════
   OVERLAY
══════════════════════════════════════════ */
const Overlay = (() => {
  const { $, showToast } = UI;
  const MAX_DIMENSION = 4096;

  function load(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const el = $('overlay-img');
        el.src = e.target.result; // direkt laden für beste Qualität
        el.style.display = 'block';
        $('slider-row').style.display = 'flex';
        $('opacity-badge').style.visibility = 'visible';
        $('no-overlay-hint').style.display = 'none';
        showToast('✓ Referenzbild geladen');
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function setOpacity(value) {
    $('overlay-img').style.opacity = value / 100;
    $('opacity-badge').textContent  = `${value}%`;
  }

  return { load, setOpacity };
})();

/* ══════════════════════════════════════════
   CAPTURE (Mit High-Res Crop Fix)
══════════════════════════════════════════ */
const Capture = (() => {
  const { $, showScreen, showToast, dataUrlToBlob } = UI;
  let lastDataUrl = null;
  let lastFilename = null;

  async function shoot() {
    const video = $('video');
    if (!video.videoWidth) { showToast('Kamera lädt...'); return; }

    const dataUrl  = _captureFrame(video);
    const filename = _generateFilename();

    lastDataUrl = dataUrl;
    lastFilename = filename;

    _triggerFlash();
    _updateThumbnail(dataUrl);
    await _save(dataUrl, filename);
  }

  function _captureFrame(video) {
    const canvas = $('canvas');
    
    // CSS Bildschirmgröße (sichtbarer Bereich)
    const screenW = video.offsetWidth;
    const screenH = video.offsetHeight;

    // Echte Pixelauflösung der Kamera (Hochauflösend!)
    const streamW = video.videoWidth;
    const streamH = video.videoHeight;

    // Skalierungsfaktor von object-fit:cover
    const coverScale = Math.max(screenW / streamW, screenH / streamH);

    const renderedW = streamW * coverScale;
    const renderedH = streamH * coverScale;

    // Crop Offset für zentriertes Bild berechnen
    const cropOffsetX = (renderedW - screenW) / 2;
    const cropOffsetY = (renderedH - screenH) / 2;

    // Quell-Ausschnitt in den echten Videopixeln
    const srcX = cropOffsetX / coverScale;
    const srcY = cropOffsetY / coverScale;
    const srcW = screenW / coverScale;
    const srcH = screenH / coverScale;

    // FIX 2: Canvas bekommt die originalen, hochauflösenden Videopixel
    canvas.width  = srcW;
    canvas.height = srcH;

    canvas.getContext('2d').drawImage(video, srcX, srcY, srcW, srcH, 0, 0, srcW, srcH);
    return canvas.toDataURL('image/jpeg', 1.0); // 100% Qualität
  }

  function _generateFilename() {
    const now = new Date();
    const pad = n => String(n).padStart(2, '0');
    return `timelapse_${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}.jpg`;
  }

  function _triggerFlash() {
    const flash = $('flash');
    flash.style.opacity = 1;
    setTimeout(() => { flash.style.opacity = 0; }, 80);
  }

  function _updateThumbnail(dataUrl) {
    $('last-photo-img').src = dataUrl;
    $('last-photo-img').style.display = 'block';
    $('last-photo-icon').style.display = 'none';
  }

  async function _save(dataUrl, filename) {
    if (location.protocol !== 'file:' && typeof navigator.share === 'function') {
      try {
        const file = new File([dataUrlToBlob(dataUrl)], filename, { type: 'image/jpeg' });
        await navigator.share({ files: [file], title: 'Timelapse Foto' });
        return;
      } catch (err) {
        if (err.name === 'AbortError') return;
      }
    }
    $('save-preview-img').src = dataUrl;
    showScreen('screen-save');
  }

  return { shoot, getLastDataUrl: () => lastDataUrl, getLastFilename: () => lastFilename };
})();

/* ══════════════════════════════════════════
   APP INITIALIZATION
══════════════════════════════════════════ */
const App = (() => {
  const { $, showScreen, dataUrlToBlob } = UI;

  function init() {
    UI.lockScroll();
    
    // Screens
    $('btn-start').addEventListener('click', () => Camera.start());
    $('btn-retry').addEventListener('click', () => Camera.start());
    $('btn-perm-back').addEventListener('click', () => showScreen('screen-start'));
    $('btn-close-camera').addEventListener('click', () => { Camera.stop(); showScreen('screen-start'); });

    // Grid Toggle (NEU)
    $('btn-toggle-grid').addEventListener('click', () => {
      const grid = $('grid-overlay');
      grid.classList.toggle('active');
      UI.showToast(grid.classList.contains('active') ? 'Raster ein' : 'Raster aus', 1000);
    });

    // Capture & Controls
    $('shutter-btn').addEventListener('click', () => Capture.shoot());
    $('load-ref-btn').addEventListener('click', () => $('ref-input').click());
    $('ref-input').addEventListener('change', e => {
      Overlay.load(e.target.files[0]);
      e.target.value = '';
    });
    $('opacity-slider').addEventListener('input', e => Overlay.setOpacity(parseInt(e.target.value, 10)));
    
    // Save Fallback
    $('save-back-btn').addEventListener('click', () => {
      $('save-preview-img').src = '';
      showScreen('screen-camera');
    });
    $('save-share-btn').addEventListener('click', async () => {
      const dataUrl = Capture.getLastDataUrl();
      if (!dataUrl) return;
      if (typeof navigator.share === 'function') {
        try {
          const file = new File([dataUrlToBlob(dataUrl)], Capture.getLastFilename(), { type: 'image/jpeg' });
          await navigator.share({ files: [file] });
        } catch (e) {}
      } else {
        UI.showToast('Bitte Bild lang gedrückt halten');
      }
    });
  }

  return { init };
})();

App.init();
</script>
</body>
</html>
